name: build

on:
  push:
    branches:
      - master   # 或 main，确认你的默认分支

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEY_REPO: ${{ secrets.KEY_REPO }}
      KEY_TOKEN: ${{ secrets.KEY_TOKEN }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Checkout Android Keystore
        if: ${{ env.KEY_REPO != '' && env.KEY_TOKEN != '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEY_REPO }}
          token: ${{ env.KEY_TOKEN }}
          path: keystore

      - name: Prepare keystore.properties
        run: |
          echo "storeFile=keystore/$(ls keystore/*.keystore | xargs -n1 basename)" > keystore/keystore.properties
          echo "storePassword=${STORE_PASSWORD}" >> keystore/keystore.properties
          echo "keyAlias=${KEY_ALIAS}" >> keystore/keystore.properties
          echo "keyPassword=${KEY_PASSWORD}" >> keystore/keystore.properties

      - name: Verify keystore setup (安全检查)
        run: |
          echo "=== 检查 keystore 目录内容 ==="
          ls -l keystore
          echo "=== 检查 keystore.properties 中的 storeFile 字段 ==="
          grep "storeFile" keystore/keystore.properties
          echo "=== 检查 keystore.properties 中的 keyAlias 字段 ==="
          grep "keyAlias" keystore/keystore.properties

      - name: Check keystore alias with keytool (PKCS12)
        run: |
          echo "=== 使用 keytool 检查 keystore 文件中的 alias (PKCS12) ==="
          FILE=$(ls keystore/*.keystore | head -n1)
          echo "检查文件: $FILE"
          keytool -list -v -keystore "$FILE" -storepass "${STORE_PASSWORD}" -storetype PKCS12 | grep "Alias name" || echo "⚠️ keystore 检查失败，请确认密码和 alias 是否正确"
      - name: Move keystore to app folder
        run: |
          mv -f keystore app/
          ls -l app/keystore

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Release APK
        run: |
          echo "开始编译 Release 包"
          chmod +x gradlew
          ./gradlew clean
          sleep 5
          ./gradlew :app:assembleRelease --build-cache --parallel --daemon --warning-mode all --info

      - name: Build Debug APK
        run: |
          echo "开始编译 Debug 包"
          chmod +x gradlew
          ./gradlew :app:assembleDebug --build-cache --parallel --daemon --warning-mode all --info

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v6
        with:
          name: FQWeb-Release
          path: ${{ github.workspace }}/app/build/outputs/apk/release/*.apk

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v6
        with:
          name: FQWeb-Debug
          path: ${{ github.workspace }}/app/build/outputs/apk/debug/*.apk
