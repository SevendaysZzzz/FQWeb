name: build

on:
  push:
    branches:
      - master   # 或 main，确认你的默认分支

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEY_REPO: ${{ secrets.KEY_REPO }}
      KEY_TOKEN: ${{ secrets.KEY_TOKEN }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Checkout Android Keystore
        if: ${{ env.KEY_REPO != '' && env.KEY_TOKEN != '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEY_REPO }}
          token: ${{ env.KEY_TOKEN }}
          path: keystore

      - name: Copy keystore file
        run: |
          mkdir -p app/keystore
          cp keystore/*.keystore app/keystore/

      - name: Prepare keystore.properties
        run: |
          echo "storeFile=app/keystore/$(ls app/keystore/*.keystore | xargs -n1 basename)" > app/keystore/keystore.properties
          echo "storePassword=${STORE_PASSWORD}" >> app/keystore/keystore.properties
          echo "keyAlias=${KEY_ALIAS}" >> app/keystore/keystore.properties
          echo "keyPassword=${KEY_PASSWORD}" >> app/keystore/keystore.properties

      - name: Verify keystore setup (安全检查)
        run: |
          echo "=== 检查 app/keystore 目录内容 ==="
          ls -l app/keystore
          echo "=== 检查 keystore.properties 中的 storeFile 字段 ==="
          grep "storeFile" app/keystore/keystore.properties
          echo "=== 检查 keystore.properties 中的 keyAlias 字段 ==="
          grep "keyAlias" app/keystore/keystore.properties

      - name: Check keystore alias with keytool
        run: |
          echo "=== 使用 keytool 检查 keystore 文件中的 alias ==="
          keytool -list -keystore app/keystore/*.keystore -storepass "${STORE_PASSWORD}" | grep "Alias name"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build With Gradle
        run: |
          echo "开始编译打包"
          chmod +x gradlew
          ./gradlew :app:assembleRelease --build-cache --parallel --daemon --warning-mode all --info

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: FQWeb
          path: ${{ github.workspace }}/app/build/outputs/apk/release/*.apk
